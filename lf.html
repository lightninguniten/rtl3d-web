<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="LF lightning observation network — stations, sensors, and 3D localization results.">
  <title>LF Network — RTL3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
</head>
<body data-page="lf">
  <div class="viewport-shell">
    <header class="top-bar">
      <div class="top-left">
        <a id="back-btn" class="btn-icon btn-nav" href="#" title="Back" aria-label="Previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          <span class="btn-label">Back</span>
        </a>
        <a href="index.html" class="btn-icon btn-nav" title="Home" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          <span class="btn-label">Home</span>
        </a>
        <div class="brand">
          <span class="brand-icon">⚡</span>
          <span class="brand-text">RTL3D · LF</span>
        </div>
      </div>
      <div class="top-actions">
        <button type="button" class="btn-icon" data-fb-qr title="Facebook" aria-label="Show Facebook QR code">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </button>
        <button id="fullscreen-btn" class="btn-icon" title="Toggle fullscreen" aria-label="Toggle fullscreen">
          <svg class="icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          <svg class="icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
        </button>
      </div>
    </header>

    <div class="viewport-frame" id="viewport-frame">
    <div class="viewport-169" id="viewport-169">
      <div class="lightning-bg" aria-hidden="true">
        <canvas id="lightning-canvas"></canvas>
        <div class="grid-overlay"></div>
      </div>

      <main class="lf-page">
        <header class="lf-page-header">
          <span class="section-tag">LF Network</span>
          <h1>Low Frequency Lightning Observation</h1>
        </header>

        <div class="detail-body lf-page-body">
          <aside class="detail-side">
            <section class="detail-block">
              <h3>Sensor system</h3>
              <div class="sensor-diagram" aria-hidden="true">
                <svg viewBox="0 0 200 175" class="sensor-svg">
                  <rect x="88" y="118" width="24" height="32" rx="3" fill="#1e293b" stroke="#60a5fa"/>
                  <text x="100" y="136" text-anchor="middle" fill="#94a3b8" font-size="7">SDR</text>
                  <line x1="100" y1="118" x2="100" y2="48" stroke="#64748b" stroke-width="3"/>
                  <ellipse cx="100" cy="40" rx="28" ry="10" fill="none" stroke="#fbbf24" stroke-width="3"/>
                  <path d="M72 40 Q100 8 128 40" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 3"/>
                  <text x="100" y="14" text-anchor="middle" fill="#94a3b8" font-size="8">Fast Antenna LF</text>
                  <text x="100" y="166" text-anchor="middle" fill="#64748b" font-size="7">LF channel imager (~kHz–500 kHz)</text>
                </svg>
              </div>
              <p class="detail-text">Software-defined radio receivers with Fast Antenna LF record electromagnetic radiation from lightning channels. Time-of-arrival across the network enables 3D localization with &gt;120 km coverage.</p>
            </section>

            <section class="detail-block detail-block-sites">
              <h3>Station locations</h3>
              <ul class="site-table drag-scroll" id="lf-site-list" data-drag-scroll aria-label="Station list — drag to scroll"></ul>
            </section>
          </aside>

          <section class="detail-main">
            <div class="detail-controls">
              <label for="lf-flash-select">Select lightning event</label>
              <select id="lf-flash-select" class="page-select"></select>
              <p id="lf-flash-meta" class="flash-meta"></p>
            </div>
            <div class="lf-plots">
              <div id="lf-plot-plan" class="lf-plot"></div>
              <div class="lf-plot lf-plot-3d-wrap">
                <div id="lf-plot-3d" class="lf-plot-3d"></div>
                <div class="lf-3d-controls">
                  <button type="button" id="lf-3d-play" class="lf-3d-play" aria-label="Play 3D animation" title="Play / pause 3D">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>
                  </button>
                  <button type="button" id="lf-3d-repeat" class="lf-3d-repeat" aria-label="Repeat 3D animation" title="Repeat 3D off">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
                  </button>
                </div>
              </div>
              <div id="lf-plot-time" class="lf-plot"></div>
              <div id="lf-plot-xz" class="lf-plot"></div>
              <div id="lf-plot-zy" class="lf-plot"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    </div>
  </div>

  <script src="js/site-pages.js"></script>
  <script src="js/qrcode.min.js"></script>
  <script src="js/facebook-qr.js"></script>
  <script src="js/drag-scroll.js"></script>
  <script src="data/lf/lf-data.js"></script>
  <script src="js/viewport.js"></script>
  <script src="js/page-common.js"></script>
  <script src="js/lf-page.js" defer></script>
</body>
</html>
