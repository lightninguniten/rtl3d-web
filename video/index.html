    /* Make the stage fill the fixed 16:9 viewport box exactly. */
    body[data-page="video"] .slide-inner {
      height: 100%;

    /* ---- Cinematic stage ---------------------------------------------- */
    .vid-stage {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border-radius: 14px;
      background: #001A3A;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f8fafc;
      container-type: size;
      isolation: isolate;

    /* animated storm grid */
    .vid-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
      background:
        linear-gradient(rgba(96, 165, 250, 0.07) 1px, transparent 1px) 0 0 / 100% 8%,
        linear-gradient(90deg, rgba(96, 165, 250, 0.07) 1px, transparent 1px) 0 0 / 8% 100%;
      animation: gridDrift 18s linear infinite;
    }
    @keyframes gridDrift {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 0 8%, 8% 0; }
    }

    /* Distant sheet-lightning flashes — pure CSS, runs under everything. */
    .vid-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 0;
    }
    .vid-flash::before,
    .vid-flash::after {
      content: '';
      position: absolute;
      inset: -20%;
      opacity: 0;
    }
    .vid-flash::before {
      background: radial-gradient(60% 50% at 25% 18%, rgba(186, 214, 255, 0.85), transparent 60%);
      animation: sheetFlashA 6.5s ease-in-out infinite;
    }
    .vid-flash::after {
      background: radial-gradient(55% 45% at 78% 30%, rgba(255, 240, 200, 0.7), transparent 60%);
      animation: sheetFlashB 6.5s ease-in-out infinite;
    }
    @keyframes sheetFlashA {
      0%, 100% { opacity: 0; }
      6% { opacity: 0.9; }
      9% { opacity: 0.15; }
      12% { opacity: 0.75; }
      16% { opacity: 0; }
      55% { opacity: 0; }
      58% { opacity: 0.5; }
      61% { opacity: 0; }
    }
    @keyframes sheetFlashB {
      0%, 100% { opacity: 0; }
      30% { opacity: 0; }
      34% { opacity: 0.8; }
      37% { opacity: 0.1; }
      40% { opacity: 0.6; }
      44% { opacity: 0; }
    }

    /* soft vignette to keep text readable over flashes */
    .vid-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(125% 110% at 50% 40%, transparent 62%, rgba(0, 26, 58, 0.62) 100%);

    .vid-scene {

      align-items: center;

      padding-bottom: clamp(0.2rem, 0.8cqh, 0.45rem);
      gap: clamp(0.15rem, 0.6cqh, 0.35rem);
      will-change: opacity, transform;
    }
    /* Caption stays narrow; art breaks out to full stage width. */

      opacity: 0;
    }

    /* ---- Chapter label ------------------------------------------------- */
    .vid-chapter {
      position: absolute;
      top: clamp(0.7rem, 2.6cqh, 1.5rem);
      left: 0;
      right: 0;
      z-index: 4;
      text-align: center;          /* centre without a transform GSAP can clobber */
      font-size: clamp(0.55rem, 1.5cqh, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.34em;
      /* compensate for trailing letter-spacing so text reads optically centred */
      padding-left: 0.34em;
      text-transform: uppercase;
      color: rgba(255, 199, 44, 0.85);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
    }

    /* ---- Reusable "fact card" scene ------------------------------------ */
    .vid-fact-icon {
      font-size: clamp(1.8rem, 7cqh, 3.6rem);
      line-height: 1;
      margin-bottom: clamp(0.35rem, 1.4cqh, 0.9rem);
      filter: drop-shadow(0 0 18px rgba(96, 165, 250, 0.4));
      opacity: 0;
    }
    .vid-fact-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      margin-bottom: clamp(0.4rem, 1.6cqh, 1rem);
      opacity: 0;
    }
    .vid-fact-stat .num {
      font-size: clamp(2.1rem, 9.5cqh, 5.2rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: #FFC72C;
      text-shadow: 0 0 40px rgba(255, 199, 44, 0.35);
    }
    .vid-fact-stat .num small { font-size: 0.5em; font-weight: 800; }
    .vid-fact-stat .unit {
      font-size: clamp(0.6rem, 1.7cqh, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .vid-fact-line {
      font-size: clamp(0.84rem, 2.3cqh, 1.35rem);
      font-weight: 500;
      line-height: 1.45;
      color: #e2e8f0;
      max-width: 40ch;
      opacity: 0;
    }
    .vid-fact-line b { color: #FFC72C; font-weight: 700; }

    /* ---- Scene 5 — RTL3D acronym --------------------------------------- */
    .vid-acronym {
      display: flex;
      gap: clamp(0.1rem, 0.6cqw, 0.35rem);
      font-size: clamp(2.4rem, 12cqh, 6.5rem);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .vid-acronym .ac { display: inline-block; opacity: 0; will-change: transform, opacity; }
    .vid-acronym .ac.accent { color: #FFC72C; }
    .vid-acronym-expand {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.3rem 0.6rem;
      margin: clamp(0.4rem, 1.6cqh, 1rem) 0 clamp(0.5rem, 1.8cqh, 1.1rem);
      font-size: clamp(0.75rem, 2cqh, 1.15rem);
      font-weight: 600;
      color: #cbd5e1;
    }
    .vid-acronym-expand .aw { opacity: 0; will-change: transform, opacity; }
    .vid-acronym-expand .aw b { color: #FFC72C; }
    .vid-acronym-expand .aw.accent { color: #FFC72C; }

    /* ---- Scene 10 — Don'ts list ---------------------------------------- */
    .vid-donts-title {
      font-size: clamp(1rem, 3.2cqh, 1.8rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: clamp(0.5rem, 1.8cqh, 1.1rem);
      opacity: 0;
    }
    .vid-donts {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(0.4rem, 1.4cqh, 0.85rem);
      max-width: 44ch;
      text-align: left;
    }
    .vid-donts .dont {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: clamp(0.78rem, 2.1cqh, 1.2rem);
      font-weight: 500;
      line-height: 1.35;
      color: #e2e8f0;
      opacity: 0;
      will-change: transform, opacity;
    }
    .vid-donts .dont b { color: #FFC72C; font-weight: 700; }
    .vid-donts .x {
      flex-shrink: 0;
      width: 1.5em;
      height: 1.5em;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(248, 113, 113, 0.18);
      color: #f87171;
      font-weight: 800;
      font-size: 0.85em;
    }

    /* ---- Scene 2 — Data ----------------------------------------------- */
    .vid-data {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: clamp(1rem, 4cqw, 3rem);
      align-items: center;
      width: 100%;
      max-width: 1100px;
    }
    @container (max-width: 620px) {
      .vid-data { grid-template-columns: 1fr; gap: clamp(0.6rem, 3cqh, 1.2rem); }
      .vid-map { max-height: 38cqh; }
    }

    /* Stylised "grid map" placeholder of Peninsular Malaysia / Klang Valley */
    .vid-map {
      position: relative;
      aspect-ratio: 1 / 1;
      width: 100%;
      border-radius: 16px;
      background:
        linear-gradient(rgba(96, 165, 250, 0.09) 1px, transparent 1px) 0 0 / 100% 9%,
        linear-gradient(90deg, rgba(96, 165, 250, 0.09) 1px, transparent 1px) 0 0 / 9% 100%,
        radial-gradient(circle at 38% 46%, rgba(15, 35, 70, 0.9), rgba(8, 18, 40, 0.95));
      border: 1px solid rgba(255, 199, 44, 0.22);
      box-shadow: inset 0 0 60px rgba(0, 26, 58, 0.6);
      overflow: hidden;
      opacity: 0;
    }
    /* concentric "strike density" rings centred on the Klang Valley hotspot */
    .vid-ring {
      position: absolute;
      top: 46%;
      left: 38%;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      border: 1.5px solid rgba(255, 199, 44, 0.55);
      will-change: transform, opacity;
    }
    .vid-ring.r1 { width: 22%; height: 22%; background: rgba(255, 199, 44, 0.18); }
    .vid-ring.r2 { width: 42%; height: 42%; }
    .vid-ring.r3 { width: 64%; height: 64%; border-color: rgba(255, 199, 44, 0.32); }
    .vid-hotspot {
      position: absolute;
      top: 46%;
      left: 38%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FFC72C;
      box-shadow: 0 0 18px 4px rgba(255, 199, 44, 0.8);
      transform: translate(-50%, -50%) scale(0);
    }
    .vid-map-label {
      position: absolute;
      top: calc(46% + 7%);
      left: 38%;
      transform: translateX(-50%);
      font-size: clamp(0.6rem, 1.5cqh, 0.85rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #FFE07A;
      white-space: nowrap;
      opacity: 0;
    }

    .vid-data-copy { text-align: left; }
    .vid-stat-tag {
      font-size: clamp(0.58rem, 1.5cqh, 0.82rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #60a5fa;
      opacity: 0;
    }
    .vid-stat-num {
      font-size: clamp(2.4rem, 11cqh, 6rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: #fff;
      margin: clamp(0.2rem, 1cqh, 0.5rem) 0;
      opacity: 0;
    }
    .vid-stat-num span { color: #FFC72C; }
    .vid-data-line {
      font-size: clamp(0.82rem, 2.3cqh, 1.32rem);
      font-weight: 500;
      line-height: 1.4;
      color: #e2e8f0;
      max-width: 26ch;
    }
    .vid-data-line .line { display: block; opacity: 0; will-change: transform, opacity; }
    .vid-data-line b { color: #FFC72C; font-weight: 700; }

    /* ---- Scene 3 — Outro ---------------------------------------------- */
    .vid-outro-logo {
      font-size: clamp(1.4rem, 5cqh, 3rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      opacity: 0;
    }
    .vid-outro-logo .mark { color: #FFC72C; }
    .vid-cta {
      font-size: clamp(1.5rem, 6.5cqh, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.05;
      margin-top: clamp(0.5rem, 2cqh, 1.25rem);
      opacity: 0;
    }
    .vid-cta .accent { color: #FFC72C; }
    .vid-outro-sub {
      margin-top: clamp(0.7rem, 2.5cqh, 1.5rem);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(0.5rem, 1.5cqw, 0.9rem);
      opacity: 0;
    }
    .vid-quiz-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #FFC72C, #e6a800);
      color: #001A3A;
      font-weight: 800;
      font-size: clamp(0.8rem, 2cqh, 1.05rem);
      text-decoration: none;
      box-shadow: 0 8px 30px rgba(255, 199, 44, 0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .vid-quiz-link:hover { transform: translateY(-2px); box-shadow: 0 12px 38px rgba(255, 199, 44, 0.45); }
    /* "Replay video" button inside the outro, next to the quiz link */
    .vid-outro-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.3rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255, 199, 44, 0.5);
      background: rgba(255, 199, 44, 0.08);
      color: #FFC72C;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(0.8rem, 2cqh, 1.05rem);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }
    .vid-outro-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 199, 44, 0.16);
      border-color: #FFC72C;
    }

    /* ---- Progress + controls ------------------------------------------ */
    .vid-progress {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 10px;                 /* the visible track — tall, easy to grab */
      background: rgba(255, 255, 255, 0.14);
      z-index: 6;
      cursor: pointer;
      touch-action: none;           /* let us own drag gestures, no page scroll */
      transition: height 0.12s ease, background 0.12s ease;
    }
    /* an even taller invisible hit-zone above the track for forgiving aim */
    .vid-progress::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: clamp(20px, 4cqh, 34px);
    }
    .vid-progress:hover,
    .vid-progress.is-scrubbing {
      height: 14px;
      background: rgba(255, 255, 255, 0.2);
    }
    .vid-progress-fill {
      position: relative;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFC72C, #FFE07A);
      box-shadow: 0 0 12px rgba(255, 199, 44, 0.7);
    }
    /* the draggable knob, sitting at the playhead */
    .vid-progress-fill::after {
      content: '';
      position: absolute;
      right: -7px;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 10px rgba(255, 199, 44, 0.95);
      transform: translateY(-50%) scale(0);
      transition: transform 0.12s ease;
    }
    .vid-progress:hover .vid-progress-fill::after,
    .vid-progress.is-scrubbing .vid-progress-fill::after {
      transform: translateY(-50%) scale(1);
    }

    /* centre play/pause cue (▶ stays while paused, ❚❚ flashes on resume) */
    .vid-playpause {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.82);
      z-index: 7;
      pointer-events: none;
      width: clamp(3.2rem, 13cqh, 5.5rem);
      height: clamp(3.2rem, 13cqh, 5.5rem);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 10, 28, 0.5);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
      color: #fff;
      font-size: clamp(1.2rem, 5.5cqh, 2.4rem);
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .vid-playpause.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .vid-music-credit {
      position: absolute;
      left: clamp(0.5rem, 2cqw, 1rem);
      bottom: clamp(0.45rem, 1.5cqh, 0.85rem);
      z-index: 4;
      margin: 0;
      max-width: min(92%, 28rem);
      font-size: clamp(0.52rem, 1.35cqw, 0.68rem);
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.42);
      pointer-events: none;
    }
    body.vid-kiosk .vid-music-credit { display: none; }
    .vid-scene-dots {
      position: absolute;
      top: clamp(0.7rem, 2.5cqh, 1.4rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 4;
    }
    .vid-scene-dots .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .vid-scene-dots .dot.is-active { background: #FFC72C; transform: scale(1.35); }

    /* Tap-to-start poster */
    .vid-poster {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.25rem, 1cqh, 0.5rem);
      background: radial-gradient(120% 120% at 50% 42%, rgba(15, 30, 60, 0.55), rgba(5, 11, 24, 0.92));
      border: 0;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: center;
      padding: 1rem;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .vid-poster.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .vid-poster-bolt {
      font-size: clamp(2.4rem, 11cqh, 5.5rem);
      line-height: 1;
      filter: drop-shadow(0 0 28px rgba(255, 199, 44, 0.75));
      animation: posterBolt 2.6s ease-in-out infinite;
    }
    @keyframes posterBolt {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 22px rgba(255, 199, 44, 0.55)); }
      50% { transform: scale(1.06); filter: drop-shadow(0 0 34px rgba(255, 199, 44, 0.9)); }
    }
    .vid-poster-title {
      font-size: clamp(1.3rem, 5.5cqh, 3rem);
      font-weight: 900;
      letter-spacing: -0.01em;
    }
    .vid-poster-sub {
      font-size: clamp(0.75rem, 2cqh, 1.05rem);
      color: #cbd5e1;
      margin-bottom: clamp(0.5rem, 1.8cqh, 1rem);
    }
    .vid-poster-play {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #FFC72C, #e6a800);
      color: #001A3A;
      font-weight: 800;
      font-size: clamp(0.82rem, 2.2cqh, 1.1rem);
      box-shadow: 0 10px 34px rgba(255, 199, 44, 0.35);
      transition: transform 0.18s ease;
    }
    .vid-poster:hover .vid-poster-play { transform: translateY(-2px) scale(1.03); }
    .vid-poster-play-icon { font-size: 0.8em; }

    /* Kiosk / screensaver mode (?kiosk=1): drop all chrome, fill the frame. */
    body.vid-kiosk .top-bar { display: none; }
    body.vid-kiosk .vid-poster { display: none; }
    body.vid-kiosk .viewport-frame { padding: 0; }
    body.vid-kiosk .slide-inner { padding: 0; }
    body.vid-kiosk .vid-stage { border-radius: 0; }
  </style>
</head>

        </button>
      </div>
    </header>

    <div class="viewport-frame" id="viewport-frame">
      <div class="viewport-169" id="viewport-169">

          <div class="slide-inner video-page-inner">

            <div class="vid-stage" id="vid-stage" role="img"
                 aria-label="Animated lightning lesson narrated phrase by phrase: how lightning forms, who it strikes, whether it strikes twice, where you are safe, and how RTL3D can choose where it strikes.">
              <div class="vid-grid" aria-hidden="true"></div>
              <div class="vid-vignette" aria-hidden="true"></div>

              <svg class="vid-channel" id="vid-channel" viewBox="0 0 1000 562" preserveAspectRatio="none" aria-hidden="true">
                <path class="ch-halo" id="ch-halo"></path>
                <path class="ch-mid"  id="ch-mid"></path>

              <div class="vid-flash" id="vid-flash" aria-hidden="true"></div>
              <div class="vid-playpause" id="vid-playpause" aria-hidden="true"></div>

              <audio id="vid-bgm" preload="auto" loop src="bgmusic.mp3"></audio>

              <button type="button" class="vid-poster" id="vid-poster" aria-label="Play the lesson with sound">

              <!-- Scenes are generated by lesson.js into #vid-scenes -->

              <div class="vid-progress" aria-hidden="true"><div class="vid-progress-fill" id="vid-progress-fill"></div></div>

            </div>

          </div>
        </main>
      </div>
    </div>
  </div>
