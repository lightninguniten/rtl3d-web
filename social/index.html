<!DOCTYPE html>
<html lang="en">
<head>
  <base href="../">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.88em' x='.12em' font-size='82'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
  <meta name="description" content="Follow RTL3D on Facebook and Instagram">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lightninguniten.github.io/rtl3d-web/social/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="RTL3D">
  <meta property="og:title" content="Follow Us — RTL3D">
  <meta property="og:url" content="https://lightninguniten.github.io/rtl3d-web/social/">
  <title>Follow Us — RTL3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .social-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.6rem, 2cqw, 1.1rem);
      width: 100%;
      align-items: start;
    }

    @media (max-width: 580px) {
      .social-columns { grid-template-columns: 1fr; }
    }

    .social-col {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      min-width: 0;
    }

    .social-col-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.8rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 199, 44, 0.2);
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(14px) saturate(165%);
      -webkit-backdrop-filter: blur(14px) saturate(165%);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.07);
    }

    .social-col-icon-wrap {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .social-col-icon-wrap.fb { background: linear-gradient(135deg, #1877f2, #0d5ed9); }
    .social-col-icon-wrap.ig { background: linear-gradient(135deg, #f58529, #dd2a7b, #515bd4); }

    .social-col-header-text { flex: 1; min-width: 0; }

    .social-col-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .social-col-handle {
      font-size: 0.68rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .social-col-open {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.28rem 0.6rem;
      border: 1.5px solid rgba(255, 199, 44, 0.35);
      border-radius: 6px;
      background: rgba(255, 199, 44, 0.08);
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: border-color 0.18s, background 0.18s;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .social-col-open:hover {
      border-color: var(--accent);
      background: rgba(255, 199, 44, 0.15);
    }

    .social-embed-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 199, 44, 0.2);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 280px;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    .social-embed-wrap iframe {
      display: block;
      border: none;
      width: 100%;
    }

    .social-col-qr-row {
      display: flex;
      justify-content: center;
    }

    .ig-embed-wrap {
      overflow: hidden;
      width: 100%;
    }

    .ig-embed-wrap iframe {
      width: 100% !important;
      max-width: 100% !important;
    }
  </style>
</head>
<body data-page="social">

      <div class="top-left">
        <a id="back-btn" class="btn-icon btn-nav" href="#" title="Back" aria-label="Previous page">

          <span class="btn-label">Back</span>
        </a>
        <a id="home-btn" href="./" class="btn-icon btn-nav" title="Home" aria-label="Home">

          <span class="btn-label">Home</span>

        <div class="brand">
          <span class="brand-icon">⚡</span>
          <span class="brand-text">RTL3D</span>

      </div>

                </div>

                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
